name: CI

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        env:
          T3CHATM_IOS_DIST_P12: ${{ secrets.T3CHATM_IOS_DIST_P12 }}
          T3CHATM_IOS_DIST_P12_PASSWORD: ${{ secrets.T3CHATM_IOS_DIST_P12_PASSWORD }}
          T3CHATM_IOS_PROFILES_TGZ: ${{ secrets.T3CHATM_IOS_PROFILES_TGZ }}
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          # --- t3chatm real codesigning (branded App Store / TestFlight) ---
          # Build a plaintext codesigning dir; Make.py's copy_profiles_from_directory
          # matches each profile by team_id+bundle_id and renames it per its internal
          # profile_name_mapping, so the 7 raw profiles can keep any filenames.
          CS="$SOURCE_DIR/build-system/t3chatm-codesigning"
          rm -rf "$CS"; mkdir -p "$CS/certs" "$CS/profiles"
          printf '%s' "$T3CHATM_IOS_DIST_P12" | base64 --decode > "$CS/certs/dist.p12"
          printf '%s' "$T3CHATM_IOS_PROFILES_TGZ" | base64 --decode > /tmp/t3profiles.tgz
          tar -xzf /tmp/t3profiles.tgz -C "$CS/profiles"
          # copy_profiles_from_directory uses os.listdir (non-recursive) — flatten.
          find "$CS/profiles" -mindepth 2 -name '*.mobileprovision' -exec mv -f {} "$CS/profiles/" \;
          ls -1 "$CS/profiles"

          # Import the signing identity into a temp keychain. Our .p12 has a non-empty
          # password, so we import inline (ImportCertificates.py assumes an empty one).
          KEYCHAIN=temp.keychain
          security create-keychain -p secret "$KEYCHAIN" || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/\"//g')
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p secret "$KEYCHAIN"
          security import "$CS/certs/dist.p12" -k "$KEYCHAIN" -P "$T3CHATM_IOS_DIST_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import build-system/AppleWWDRCAG3.cer -k "$KEYCHAIN" -P '' -T /usr/bin/codesign -T /usr/bin/security || true
          security set-key-partition-list -S apple-tool:,apple: -k secret "$KEYCHAIN" >/dev/null
          security find-identity -v -p codesigning "$KEYCHAIN"

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/t3chatm-appstore-configuration.json" \
            --codesigningInformationPath="$CS" \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # collect ipa — locate it via find; the bazel config-tree dir name varies
          # with min-os/configuration, so a fixed glob (applebin_ios-...-opt-ST-*)
          # does not match our tree (ios_arm64-opt-ios-arm64-min13.0-ST-*).
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          IPA=$(find -L bazel-out -type f -path '*/bin/Telegram/Telegram.ipa' 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then echo "ERROR: Telegram.ipa not found under bazel-out"; find -L bazel-out -name 'Telegram.ipa' 2>/dev/null; exit 1; fi
          echo "Collecting IPA: $IPA"
          cp "$IPA" "$OUTPUT_PATH/Telegram.ipa"

          # collect dsym (same tree-name caveat)
          mkdir -p build/DSYMs
          find -L bazel-out -type d -path '*/bin/Telegram/*.dSYM' 2>/dev/null -exec cp -R {} build/DSYMs/ \;
          zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null

      # Expose the signed IPA (+ dSYM zip) as a workflow artifact. upload-artifact
      # uses the Actions runtime token, so it works regardless of the repo's
      # GITHUB_TOKEN contents permission (create-release needs contents:write,
      # which this repo's default token lacks -> "Resource not accessible by
      # integration"). Download from the run's Artifacts section.
      - name: Upload signed IPA + dSYM
        uses: actions/upload-artifact@v4
        with:
          name: t3chatm-signed-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/
          retention-days: 30
          if-no-files-found: error
